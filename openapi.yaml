openapi: 3.0.0
info:
  title: API de Consulta de CEP
  description: API REST para consulta de CEP utilizando o serviço ViaCEP
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Servidor local para desenvolvimento
paths:
  /cep/{cep}:
    get:
      summary: Consulta de CEP
      description: Retorna informações de endereço com base no CEP fornecido
      parameters:
        - name: cep
          in: path
          required: true
          description: CEP a ser consultado (apenas números, sem hífen)
          schema:
            type: string
            pattern: '^\d{8}$'
      responses:
        '200':
          description: Consulta realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  cep:
                    type: string
                    example: '57040000'
                  logradouro:
                    type: string
                    example: 'Rua Exemplo'
                  complemento:
                    type: string
                    example: 'Apto 101'
                  bairro: 'Centro'
                  localidade:
                    type: string
                    example: 'Maceió'
                  uf:
                    type: string
                    example: 'AL'
                  ibge: '2704302'
                  gia:
                    type: string
                    example: '1004'
                  ddd: '82'
                  siafi: '7107'
        '400':
          description: Erro de validação  
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'CEP inválido'
        '404':
          description: CEP não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'CEP não encontrado'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Erro interno do servidor'
components:
  schemas:
    Endereco:
      type: object
      properties:
        cep:
          type: string
          example: '57040000'
        logradouro:
          type: string
          example: 'Rua Exemplo'
        complemento:
          type: string
          example: 'Apto 101'
        bairro:
          type: string
          example: 'Centro'
        localidade:
          type: string
          example: 'Maceió'
        uf:
          type: string
          example: 'AL'
        ibge:
          type: string
          example: '2704302'
        gia:
          type: string
          example: '1004'
        ddd:
          type: string
          example: '82'
        siafi:
          type: string
          example: '7107'