---
# Grupo responsável pela API de CEP
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: team-cep
  description: Time responsável pelo desenvolvimento e manutenção da API de consulta de CEP
spec:
  type: team
  profile:
    displayName: Time CEP
    email: team-cep@email.com
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: api-cep
  description: API simples em FastAPI para consultar CEP via ViaCEP
  tags:
    - api
    - rest
    - python
    - fastapi
    - docker
    - backend
    - experimental

  annotations:
    github.com/project-slug: iesodias/api-cep

  links:
    - url: https://github.com/JulioMourajr/api-cep
      title: Repositório (GitHub)
      icon: github
    - url: http://localhost:3000/api-docs
      title: API Docs (Backstage)
      icon: docs
    - url: http://localhost:8000/docs
      title: Swagger UI (FastAPI)
      icon: docs
    - url: https://viacep.com.br
      title: ViaCEP (Serviço Externo de Consulta de CEP)
      icon: web
      type: external depedency
spec:
  type: service
  lifecycle: experimental
  owner: group:default/team-cep
  providesApis:
    - api-ce
  dependsOn:
    - resource:default/viacep-api
---

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: viacep-api
  description: API externa para consulta de CEP, utilizada pela API de CEP
  tags:
    - api
    - external
    - python  

  links:
    - url: https://viacep.com.br
      title: ViaCEP (Serviço Externo de Consulta de CEP)
      icon: web
      type: external depedency
    - url: https://viacep.com.br/ws/57040000/json/
      title: Exemplo de Consulta (ViaCEP)
      icon: docs
spec:
  type: external-api
  owner: group:default/team-cep
  dependencyOf:
    -component:default/api-cep
---

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: api-ce
  description: API externa para consulta de CEP, utilizada pela API de CEP
  tags:
    - rest
    - openapi
    - cep  
spec:
  type: openapi
  lifecycle: experimental
  owner: user:default/guest
  system: api-cep
  definition: 
    $text: ./openapi.yaml